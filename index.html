<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ligeirinho Bebidas | Energia e Sabor</title>
<link rel="icon" type="image/png" href="img/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
</style>
</head>
<body style="font-family: Inter, sans-serif; background: #0a1408; color: #e8f5e3;">

<main style="position:relative; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden; background:#0a1408;">

  <div style="position:absolute;inset:0;z-index:0;pointer-events:none;">
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%, rgba(124,252,0,0.12) 0%, transparent 70%);"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(to top,#0a1408 0%,rgba(10,20,8,0.5) 50%,rgba(10,20,8,0.15) 100%);"></div>
  </div>

  <div style="position:absolute;top:-10%;right:-5%;width:45%;height:45%;background:rgba(255,215,0,0.08);filter:blur(120px);border-radius:9999px;z-index:1;pointer-events:none;"></div>
  <div style="position:absolute;bottom:-15%;left:-10%;width:50%;height:50%;background:rgba(50,205,50,0.1);filter:blur(100px);border-radius:9999px;z-index:1;pointer-events:none;"></div>

  <div style="position:relative;z-index:10;width:100%;max-width:900px;margin:0 auto;padding:0 2rem;display:flex;flex-direction:column;align-items:center;text-align:center;gap:1.75rem;">

    <span style="font-family:'Material Symbols Outlined';font-size:3.5rem;color:#7cfc00;filter:drop-shadow(0 0 24px rgba(124,252,0,0.5));">bolt</span>

    <h2 style="
      font-family:Inter,sans-serif;
      font-size:clamp(2.5rem,10vw,5.5rem);
      font-weight:800;
      letter-spacing:0.06em;
      text-transform:uppercase;
      background:linear-gradient(135deg,#7cfc00 0%,#adff2f 40%,#ffd700 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      line-height:1.05;
      user-select:none;
    ">Ligeirinho</h2>

    <p style="font-size:clamp(0.7rem,2vw,0.95rem);color:#b8d4a8;font-weight:500;letter-spacing:0.35em;text-transform:uppercase;">Bebidas</p>

    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:0.6rem;">
      <span style="padding:0.3rem 0.875rem;border-radius:9999px;border:1px solid rgba(124,252,0,0.25);background:rgba(20,40,15,0.7);color:#adff2f;font-size:0.6rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;">Refrescante</span>
      <span style="padding:0.3rem 0.875rem;border-radius:9999px;border:1px solid rgba(255,215,0,0.25);background:rgba(40,35,10,0.5);color:#ffd700;font-size:0.6rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;">Energética</span>
      <span style="padding:0.3rem 0.875rem;border-radius:9999px;border:1px solid rgba(124,252,0,0.2);background:rgba(20,40,15,0.7);color:#c8e6b0;font-size:0.6rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;">Leve</span>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:0.75rem;">
      <h1 style="
        font-family:Inter,sans-serif;
        font-size:clamp(1.1rem,2.8vw,1.85rem);
        font-weight:600;
        color:#ffffff;
        line-height:1.2;
      ">
        Sabor que
        <span style="font-style:italic;font-weight:300;color:#7cfc00;">acelera</span>
        o seu dia
      </h1>

      <p style="font-size:clamp(0.75rem,1.4vw,0.9rem);color:#9cb88a;font-weight:400;line-height:1.7;max-width:480px;margin:0 auto;">
        Bebidas pensadas para quem não para — refrescantes, leves e com a energia que você precisa.
      </p>
    </div>

    <button style="
      padding:0.85rem 2.25rem;
      border-radius:9999px;
      font-family:Inter,sans-serif;
      font-weight:700;
      font-size:0.7rem;
      letter-spacing:0.14em;
      text-transform:uppercase;
      background:linear-gradient(135deg,#7cfc00 0%,#32cd32 50%,#228b22 100%);
      color:#0a1408;
      border:none;
      cursor:pointer;
      box-shadow:0 10px 40px -8px rgba(124,252,0,0.45);
      display:inline-flex;
      align-items:center;
      gap:0.5rem;
      transition:transform 0.2s,opacity 0.2s;
    "
    onmouseover="this.style.opacity='0.92';this.style.transform='scale(1.03)'"
    onmouseout="this.style.opacity='1';this.style.transform='scale(1)'"
    onclick="location.href='home.html'"
    >
      Conhecer a marca
      <span style="font-family:'Material Symbols Outlined';font-size:1rem;">arrow_forward</span>
    </button>

  </div>
</main>
</body>
</html>
