<!DOCTYPE html>
<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#303030",
                        "on-secondary-fixed": "#001946",
                        "on-tertiary-container": "#2a2a2a",
                        "surface-container": "#1f2020",
                        "error-container": "#93000a",
                        "surface-dim": "#131313",
                        "surface-container-highest": "#353535",
                        "secondary-container": "#2c457d",
                        "outline-variant": "#414753",
                        "on-primary-container": "#2a2a2a",
                        "surface-container-low": "#1b1c1c",
                        "on-error": "#690005",
                        "inverse-surface": "#e4e2e1",
                        "tertiary-container": "#929090",
                        "on-surface-variant": "#c1c6d5",
                        "inverse-primary": "#5e5e5e",
                        "on-primary-fixed-variant": "#474747",
                        "surface-tint": "#c6c6c6",
                        secondary: "#b1c5ff",
                        "on-background": "#e4e2e1",
                        "on-surface": "#e4e2e1",
                        "on-secondary-container": "#9cb4f3",
                        "tertiary-fixed": "#e4e2e1",
                        "secondary-fixed": "#dae2ff",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#c8c6c5",
                        surface: "#131313",
                        "primary-container": "#919191",
                        background: "#131313",
                        "on-secondary-fixed-variant": "#2c457d",
                        "primary-fixed": "#e2e2e2",
                        tertiary: "#c8c6c5",
                        "surface-container-lowest": "#0e0e0e",
                        error: "#ffb4ab",
                        "on-secondary": "#122e65",
                        "primary-fixed-dim": "#c6c6c6",
                        outline: "#8b919f",
                        "surface-variant": "#353535",
                        "on-primary-fixed": "#1b1b1b",
                        "secondary-fixed-dim": "#b1c5ff",
                        "on-primary": "#303030",
                        "inverse-on-surface": "#303030",
                        "surface-container-high": "#2a2a2a",
                        primary: "#c6c6c6",
                        "on-tertiary-fixed-variant": "#474747",
                        "surface-bright": "#393939",
                        "on-tertiary-fixed": "#1b1c1c"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    },
                    fontFamily: {
                        headline: ["Inter"],
                        body: ["Inter"],
                        label: ["Inter"],
                        display: "Inter"
                    }
                }
            }
        };
    </script>
<style>
        .glass-effect-only {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .text-glow {
            text-shadow: 0 0 15px rgba(179, 197, 255, 0.4);
        }
        .bg-mesh {
            background-image: radial-gradient(at 0% 0%, rgba(0, 35, 102, 0.15) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(255, 181, 158, 0.05) 0px, transparent 50%);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30">
<!-- Hero Section -->
<main class="relative min-h-screen flex items-end overflow-hidden bg-mesh pb-24 md:pb-32">
<!-- Ambient Light Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-tertiary-container/10 blur-[100px] rounded-full"></div>
<!-- Background 3D Visual -->
<div class="absolute inset-0 z-0 opacity-40 md:opacity-60 overflow-hidden pointer-events-none">
<div class="relative w-full h-full">
<div class="absolute inset-0 bg-cover bg-center" style='background-image: url("img/iconelogo.png");'></div>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent opacity-80"></div>
<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[450px] h-[450px] bg-primary/10 blur-[150px] rounded-full mix-blend-screen"></div>
</div>
</div>
<!-- Subtle Radial Glow -->
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent opacity-80"></div>
<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/10 blur-[150px] rounded-full mix-blend-screen"></div>
</div>
</div>
<!-- Bottom Anchored Content -->
<div class="relative z-10 w-full max-w-[1920px] mx-auto px-6 md:px-12 flex flex-col items-center justify-end text-center">
    <div class="flex flex-col space-y-8 md:space-y-12 max-w-4xl">
        <div class="mb-4 md:mb-8">
            <h2 class="text-6xl md:text-8xl font-black tracking-[0.25em] uppercase bg-clip-text text-transparent bg-gradient-to-b from-[#FFFFFF] via-[#BDBDBD] to-[#4F4F4F] drop-shadow-[0_20px_30px_rgba(0,0,0,0.8)] select-none opacity-95 transition-all duration-700">
                NEXUS
            </h2>
        </div>
    </div>
</div>
<!-- Eyebrows -->
<div class="flex flex-wrap justify-center gap-3">
<span class="px-4 py-1.5 rounded-full border border-outline-variant/30 bg-surface-container-low/50 text-primary text-[9px] font-bold uppercase tracking-widest backdrop-blur-md" style="">VISÃO</span>
<span class="px-4 py-1.5 rounded-full border border-outline-variant/30 bg-surface-container-low/50 text-primary text-[9px] font-bold uppercase tracking-widest backdrop-blur-md" style="">INTELIGÊNCIA</span>
<span class="px-4 py-1.5 rounded-full border border-outline-variant/30 bg-surface-container-low/50 text-tertiary text-[9px] font-bold uppercase tracking-widest backdrop-blur-md" style="">IA E AUTOMAÇÃO</span>
</div>
<!-- Headline & Subheadline -->
<div class="space-y-6 md:space-y-8">
<h1 class="font-headline text-white leading-[1.05] tracking-tight text-glow text-4xl md:text-7xl" style="">Tecnologia <span class="italic font-light text-[0.7em] text-primary-fixed-dim ml-2">Sob Medida</span></h1>
<p class="font-body text-on-surface-variant max-w-none mx-auto leading-relaxed text-lg px-4 whitespace-nowrap" style="">Tecnologia personalizada que se adapta ao seu negócio <i>— e não o contrário</i>.</p>
</div>
<!-- CTA -->
<div class="flex flex-wrap items-center justify-center gap-6 pt-3">
<button class="px-9 py-4 rounded-full font-label font-bold uppercase tracking-[0.15em] text-xs transition-all duration-500 active:scale-95 group flex items-center gap-2" style="background: linear-gradient(135deg, rgb(245, 247, 250) 0%, rgb(195, 207, 226) 50%, rgb(127, 140, 141) 100%); color: rgb(26, 26, 26); box-shadow: rgba(0, 0, 0, 0.4) 0px 10px 30px -5px, rgba(255, 255, 255, 0.2) 0px 0px 20px;">
                    COMEÇAR AGORA
                    <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
</div>
</main>
</body></html>
