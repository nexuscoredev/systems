<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NEXUS | Tecnologia Sob Medida</title>
<link rel="icon" type="image/png" href="img/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;1,200;1,300&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #ffffff;
    --off-white: #e8e6e3;
    --muted: #9a9a9a;
    --bg: #0e0e0e;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--off-white);
    font-family: Inter, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Background layer ── */
  .bg-logo {
    position: fixed;
    inset: 0;
    background-image: url('img/iconelogo.png');
    background-size: 62% auto;
    background-position: center 52%;
    background-repeat: no-repeat;
    opacity: 0.07;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Radial vignette ── */
  .bg-vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, var(--bg) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* ── Subtle top glow ── */
  .bg-glow {
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 50%;
    background: radial-gradient(ellipse at center, rgba(200,210,255,0.055) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  /* ── Main layout ── */
  main {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
  }

  /* ── Inner wrapper ── */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
    max-width: 720px;
    width: 100%;
    animation: fadeUp 1.1s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Eyebrow ── */
  .eyebrow {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 2.5rem;
    animation: fadeUp 1.1s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  }

  .tag {
    padding: 0.28rem 0.85rem;
    border-radius: 9999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
  }

  /* ── NEXUS wordmark ── */
  .wordmark {
    font-size: clamp(5rem, 18vw, 10rem);
    font-weight: 200;
    letter-spacing: 0.22em;
    padding-right: 0.22em;
    text-transform: uppercase;
    line-height: 1;
    user-select: none;
    background: linear-gradient(175deg, #ffffff 0%, #c8c8c8 45%, #555555 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 2.75rem;
    animation: fadeUp 1.1s 0.05s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* ── Divider ── */
  .divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent);
    margin-bottom: 2.75rem;
    animation: fadeUp 1.1s 0.15s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* ── Headline ── */
  .headline {
    margin-bottom: 1.25rem;
    animation: fadeUp 1.1s 0.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  .headline h1 {
    font-size: clamp(1.5rem, 3.5vw, 2.4rem);
    font-weight: 300;
    color: var(--white);
    line-height: 1.2;
    letter-spacing: -0.01em;
  }

  .headline h1 em {
    font-style: italic;
    font-weight: 200;
    color: rgba(200, 215, 255, 0.85);
    margin-left: 0.15em;
  }

  /* ── Subheadline ── */
  .sub {
    font-size: clamp(0.72rem, 1.4vw, 0.82rem);
    color: var(--muted);
    font-weight: 300;
    line-height: 1.8;
    max-width: 400px;
    margin: 0 auto 2.75rem;
    animation: fadeUp 1.1s 0.25s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* ── CTA ── */
  .cta-wrap {
    animation: fadeUp 1.1s 0.35s cubic-bezier(0.22,1,0.36,1) both;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.85rem 2.25rem;
    border-radius: 9999px;
    font-family: Inter, sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: rgba(255,255,255,0.94);
    color: #111111;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }

  .cta:hover  { background: #ffffff; transform: scale(1.03); }
  .cta:active { transform: scale(0.98); }

  .cta .icon {
    font-family: 'Material Symbols Outlined';
    font-size: 1rem;
    line-height: 1;
  }

  /* ── Bottom meta ── */
  .meta {
    margin-top: 4rem;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    font-weight: 400;
    animation: fadeUp 1.1s 0.45s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .wordmark { letter-spacing: 0.15em; padding-right: 0.15em; }
    .sub { max-width: 90%; }
    .eyebrow { gap: 0.4rem; }
  }
</style>
</head>
<body>

  <div class="bg-logo"></div>
  <div class="bg-vignette"></div>
  <div class="bg-glow"></div>

  <main>
    <div class="hero">

      <!-- Eyebrow tags -->
      <div class="eyebrow">
        <span class="tag">Visão</span>
        <span class="tag">Inteligência</span>
        <span class="tag">IA &amp; Automação</span>
      </div>

      <!-- NEXUS wordmark -->
      <h2 class="wordmark">NEXUS</h2>

      <!-- Vertical divider -->
      <div class="divider"></div>

      <!-- Headline -->
      <div class="headline">
        <h1>Tecnologia <em>Sob Medida</em></h1>
      </div>

      <!-- Sub -->
      <p class="sub">
        Tecnologia personalizada que se adapta ao seu negócio — e não o contrário.
      </p>

      <!-- CTA -->
      <div class="cta-wrap">
        <button class="cta"
          onmousedown="this.style.transform='scale(0.98)'"
          onmouseup="this.style.transform='scale(1.03)'"
        >
          Começar agora
          <span class="icon">arrow_forward</span>
        </button>
      </div>

      <!-- Meta -->
      <p class="meta">nexus · sistemas &amp; tecnologia</p>

    </div>
  </main>

</body>
</html>
